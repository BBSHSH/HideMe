# HideMe サーバー設定
# このファイルをコピーして config.yaml を作成し、環境に合わせて編集してください

# サーバー設定
server:
  port: 8080
  host: "0.0.0.0"

# 公開 URL（Discord OAuth コールバック、フロントエンド用）
public:
  # 本番: https://hideme.example.com
  # 開発: http://localhost:8080
  url: "http://localhost:8080"

# データベース
database:
  path: "./hideme.db"

# ストレージ設定
storage:
  type: "local"  # "local" または "nas"

  # ローカルストレージ
  local:
    base_dir: "./uploads"

  # NAS ストレージ
  nas:
    host: "192.168.1.100"
    user: "admin"
    password: "password"
    share: "HideMe/uploads"
    port: 445

# Discord OAuth2
discord:
  client_id: ""
  client_secret: ""
  guild_id: ""  # 特定のサーバーのみアクセス許可（空欄で制限なし）
  required_role: ""  # 特定のロール必須（空欄で制限なし）

# ffmpeg
ffmpeg:
  path: "ffmpeg"  # PATH から検索、または絶対パス指定

# ロギング
logging:
  level: "debug"  # debug, info, warn, error
  format: "json"  # json または text
