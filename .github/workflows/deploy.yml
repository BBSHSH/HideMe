name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          cd ~/hideme/HideMe
          git stash
          git pull origin main
          cd server && go build -o ../api ./cmd/api && cd ..
          sudo systemctl restart hideme
          echo "Deploy complete"
