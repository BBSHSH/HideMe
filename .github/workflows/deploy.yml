name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          cd ~/hideme/HideMe
          git stash
          git pull origin main
          cd ~/hideme/HideMe/client && npm ci && npm run build -- --outDir ../server/dist
          cd ~/hideme/HideMe/server && go build -o ../api ./cmd/api
          sudo systemctl restart hideme
          echo "Deploy complete"
